default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://127.0.0.1:5432/supportos_dev") %>

test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", "postgresql://127.0.0.1:5432/supportos_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
